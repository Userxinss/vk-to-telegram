name: VK to Telegram Bot

on:
  schedule:
    - cron: "*/5 * * * *"   # запуск каждые 5 минут
  workflow_dispatch:         # + можно запустить вручную кнопкой на GitHub

permissions:
  contents: write            # нужно, чтобы бот мог сохранять sent_posts.json в репозиторий

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Получаем код
        uses: actions/checkout@v4

      - name: Устанавливаем Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Устанавливаем зависимости
        run: pip install requests

      - name: Запуск бота
        env:
          VK_TOKEN: ${{ secrets.VK_TOKEN }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHANNEL: ${{ secrets.TG_CHANNEL }}
        run: python bot.py

      - name: Сохраняем память в репозиторий
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_posts.json
          git diff --staged --quiet || git commit -m "Обновление списка отправленных постов"
          git push
